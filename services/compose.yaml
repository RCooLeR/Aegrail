name: aegrail-services

services:
  postgres18:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: aegrail-postgres18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AEGRAIL_POSTGRES_DB:-aegrail}
      POSTGRES_USER: ${AEGRAIL_POSTGRES_USER:-aegrail}
      POSTGRES_PASSWORD: ${AEGRAIL_POSTGRES_PASSWORD:-aegrail}
    ports:
      - "${AEGRAIL_POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres18-data:/var/lib/postgresql
      - ./postgres18/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    container_name: aegrail-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${AEGRAIL_REDIS_PORT:-56379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres18-data:
  redis-data:
